<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3fa2ff"/>
      <stop offset="100%" stop-color="#0b5fb0"/>
    </linearGradient>
    <!-- Gear-shaped hole cut out of the cloud below (ring + teeth hidden, center dot kept
         so it reads as a light "hole" the same way the previous design's dark gear did). -->
    <mask id="gearCut" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="100" height="100" fill="#fff"/>
      <g fill="#000" transform="translate(52 60)">
        <circle cx="0" cy="0" r="18.2"/>
        <rect x="-2.9" y="-26" width="5.7" height="10.4" rx="2.6"/>
        <rect x="-2.9" y="15.6" width="5.7" height="10.4" rx="2.6"/>
        <rect x="-26" y="-2.9" width="10.4" height="5.7" rx="2.6"/>
        <rect x="15.6" y="-2.9" width="10.4" height="5.7" rx="2.6"/>
        <rect x="-20.2" y="-20.2" width="7.8" height="5.7" rx="2.6" transform="rotate(-45)"/>
        <rect x="12.4" y="-20.2" width="7.8" height="5.7" rx="2.6" transform="rotate(45)"/>
        <rect x="-20.2" y="14.4" width="7.8" height="5.7" rx="2.6" transform="rotate(45)"/>
        <rect x="12.4" y="14.4" width="7.8" height="5.7" rx="2.6" transform="rotate(-45)"/>
        <circle cx="0" cy="0" r="9.4" fill="#fff"/>
      </g>
    </mask>
  </defs>

  <!-- Full-bleed rounded-square badge (almost edge-to-edge) so the artwork fills the
       canvas instead of floating in a sea of transparent padding. -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#bg)"/>

  <!-- Cloud silhouette (three overlapping puffs + a pill body), sized to nearly fill the
       badge, with the gear cut out of it via the mask above. -->
  <g mask="url(#gearCut)">
    <circle cx="34" cy="52" r="16" fill="#ffffff"/>
    <circle cx="54" cy="40" r="20" fill="#ffffff"/>
    <circle cx="74" cy="52" r="14" fill="#ffffff"/>
    <rect x="16" y="54" width="68" height="26" rx="13" fill="#ffffff"/>
  </g>
</svg>
